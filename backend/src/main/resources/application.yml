spring:
  application:
    name: ose-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ose?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:ose}
    password: ${SPRING_DATASOURCE_PASSWORD:ose123456}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  jwt:
    secret: ${APP_JWT_SECRET:ose-super-secret-key-change-me-2026}
    expire-minutes: ${APP_JWT_EXPIRE_MINUTES:720}
  default-admin:
    username: ${APP_DEFAULT_ADMIN_USERNAME:admin}
    password: ${APP_DEFAULT_ADMIN_PASSWORD:OseAdmin@2026}
    display-name: ${APP_DEFAULT_ADMIN_DISPLAY_NAME:备考管理员}
  ai:
    request-timeout-ms: ${AI_REQUEST_TIMEOUT_MS:30000}
    max-retries: ${AI_MAX_RETRIES:1}
    enable-save-review: ${AI_ENABLE_SAVE_REVIEW:true}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      default-model: ${OPENAI_DEFAULT_MODEL:gpt-4.1-mini}
      models: ${OPENAI_MODELS:gpt-4.1-mini,gpt-4.1}
      temperature: ${OPENAI_TEMPERATURE:0.2}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      default-model: ${ANTHROPIC_DEFAULT_MODEL:claude-3-5-sonnet-latest}
      models: ${ANTHROPIC_MODELS:claude-3-5-sonnet-latest,claude-3-5-haiku-latest}
      temperature: ${ANTHROPIC_TEMPERATURE:0.2}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:4000}
