spring:
  datasource:
    url: jdbc:h2:mem:ose;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never
app:
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key
    expire-minutes: 120
  default-admin:
    username: admin
    password: OseAdmin@2026
    display-name: 测试管理员
  ai:
    request-timeout-ms: 5000
    max-retries: 0
    enable-save-review: true
